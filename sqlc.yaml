version: "2"
sql:
  - engine: "mysql"
    queries: "internal/storage/sqlc/queries.sql"
    schema: "migrations/"
    gen:
      go:
        package: "queries"
        out: "internal/storage/queries"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_exact_table_names: false
