version: "3"

vars:
  BINARY: plentyone
  BUILD_DIR: bin

tasks:
  default:
    desc: "Show available tasks"
    cmds:
      - task --list

  generate:
    desc: "Run sqlc code generation"
    cmds:
      - sqlc generate

  templ:
    desc: "Generate templ Go code from .templ files"
    cmds:
      - templ generate ./internal/dashboard/views/

  css:
    desc: "Build Tailwind CSS"
    cmds:
      - ./tools/tailwindcss -i internal/dashboard/static/css/input.css -o internal/dashboard/static/css/output.css --minify

  build:
    desc: "Build the binary"
    deps: [templ, css]
    cmds:
      - go build -o {{.BUILD_DIR}}/{{.BINARY}} ./cmd/plentyone

  test:
    desc: "Run tests"
    cmds:
      - go test ./...

  test-verbose:
    desc: "Run tests with verbose output"
    cmds:
      - go test -v ./...

  lint:
    desc: "Run golangci-lint"
    cmds:
      - golangci-lint run ./...

  migrate-up:
    desc: "Run database migrations up"
    cmds:
      - ./{{.BUILD_DIR}}/{{.BINARY}} migrate

  migrate-down:
    desc: "Run database migrations down"
    cmds:
      - echo "migrate-down not yet implemented"

  clean:
    desc: "Remove build artifacts"
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -rf tmp

  dev:
    desc: "Development mode with templ watch and air"
    cmds:
      - templ generate --watch ./internal/dashboard/views/ &
      - air
